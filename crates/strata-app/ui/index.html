<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strata</title>
    <style>
      :root {
        --bg: #08080b;
        --panel: #0d0d12;
        --border: #1a1a22;
        --text: #e5e7eb;
        --text-dim: #6b7280;
        --accent: #6c8cff;
      }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #app { height: 100vh; display: flex; flex-direction: column; }
      @keyframes stratapulse {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }

      /* ---- Disk picker cards ---- */
      .disk-card {
        background: linear-gradient(180deg, #11111a 0%, #0d0d14 100%);
        border: 1px solid #1f1f2a;
        border-radius: 12px;
        padding: 18px 20px 18px;
        color: var(--text);
        text-align: left;
        cursor: pointer;
        font-family: inherit;
        transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        min-height: 140px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .disk-card:hover {
        transform: translateY(-2px);
        border-color: #3a3a55;
        box-shadow: 0 10px 28px rgba(108, 140, 255, 0.18), 0 0 0 1px rgba(108, 140, 255, 0.25) inset;
      }
      .disk-card:active { transform: translateY(0); }
      .disk-icon {
        font-size: 28px;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a26;
        border-radius: 10px;
        flex-shrink: 0;
      }
      .folder-link {
        background: none;
        border: none;
        color: #9ca3af;
        font-size: 12px;
        cursor: pointer;
        padding: 8px 12px;
        font-family: inherit;
        text-decoration: underline;
        text-underline-offset: 4px;
        text-decoration-color: #2a2a3a;
        transition: color 0.15s ease, text-decoration-color 0.15s ease;
      }
      .folder-link:hover {
        color: #c8d2ff;
        text-decoration-color: #6c8cff;
      }

      /* ---- Scanning animation ---- */
      .scan-stage {
        position: relative;
        width: 220px;
        height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .scan-ring {
        position: absolute;
        top: 50%; left: 50%;
        width: 60px; height: 60px;
        margin: -30px 0 0 -30px;
        border-radius: 50%;
        border: 1.5px solid rgba(108, 140, 255, 0.6);
        opacity: 0;
        animation: scanripple 2.4s cubic-bezier(0.2, 0.7, 0.2, 1) infinite;
      }
      .scan-ring-1 { animation-delay: 0s; }
      .scan-ring-2 { animation-delay: 0.8s; border-color: rgba(167, 139, 250, 0.55); }
      .scan-ring-3 { animation-delay: 1.6s; border-color: rgba(108, 140, 255, 0.4); }

      .scan-core {
        position: relative;
        width: 56px; height: 56px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #b9c6ff 0%, #6c8cff 45%, #4a5fd6 80%);
        box-shadow:
          0 0 32px rgba(108, 140, 255, 0.55),
          0 0 64px rgba(108, 140, 255, 0.35),
          inset 0 0 20px rgba(255, 255, 255, 0.18);
        animation: scanpulse 1.6s ease-in-out infinite;
      }

      @keyframes scanripple {
        0%   { width: 60px;  height: 60px;  margin: -30px 0 0 -30px; opacity: 0.85; }
        80%  { width: 220px; height: 220px; margin: -110px 0 0 -110px; opacity: 0;   }
        100% { width: 220px; height: 220px; margin: -110px 0 0 -110px; opacity: 0;   }
      }
      @keyframes scanpulse {
        0%, 100% { transform: scale(1);    box-shadow: 0 0 32px rgba(108,140,255,0.55), 0 0 64px rgba(108,140,255,0.35), inset 0 0 20px rgba(255,255,255,0.18); }
        50%      { transform: scale(1.08); box-shadow: 0 0 44px rgba(108,140,255,0.75), 0 0 88px rgba(108,140,255,0.5),  inset 0 0 24px rgba(255,255,255,0.28); }
      }
      @keyframes slideInRight {
        from { transform: translateX(20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
