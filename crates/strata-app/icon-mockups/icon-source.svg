<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b3ff"/>
      <stop offset="100%" stop-color="#6c8cff"/>
    </linearGradient>
    <!-- subtle inner highlight on each slab -->
    <linearGradient id="slab-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- macOS-style superellipse-ish rounded background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- soft glow behind the S -->
  <g filter="url(#blur)">
    <ellipse cx="512" cy="512" rx="360" ry="280" fill="#6c8cff" opacity="0.18"/>
  </g>
  <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="40"/>
  </filter>

  <!-- Stacked S: five horizontal slabs forming an S silhouette
       Layout (in 0..1024 coords) — chunky, friendly, reads at 32px:
         Top slab:        full width
         Upper indent:    left half
         Mid slab:        full width
         Lower indent:    right half
         Bottom slab:     full width
       Slabs sit on a 5-row grid centred vertically. -->
  <g>
    <!-- Slab 1 (top) -->
    <rect x="224" y="224" width="576" height="104" rx="24" fill="url(#s)"/>
    <rect x="224" y="224" width="576" height="50"  rx="24" fill="url(#slab-highlight)"/>

    <!-- Slab 2 (upper indent, left half) -->
    <rect x="224" y="352" width="320" height="104" rx="24" fill="url(#s)"/>
    <rect x="224" y="352" width="320" height="50"  rx="24" fill="url(#slab-highlight)"/>

    <!-- Slab 3 (mid, full width) -->
    <rect x="224" y="480" width="576" height="104" rx="24" fill="url(#s)"/>
    <rect x="224" y="480" width="576" height="50"  rx="24" fill="url(#slab-highlight)"/>

    <!-- Slab 4 (lower indent, right half) -->
    <rect x="480" y="608" width="320" height="104" rx="24" fill="url(#s)"/>
    <rect x="480" y="608" width="320" height="50"  rx="24" fill="url(#slab-highlight)"/>

    <!-- Slab 5 (bottom) -->
    <rect x="224" y="736" width="576" height="104" rx="24" fill="url(#s)"/>
    <rect x="224" y="736" width="576" height="50"  rx="24" fill="url(#slab-highlight)"/>
  </g>
</svg>
